<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <style>
      text { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>
  <rect width="800" height="350" fill="#0A0A0A"/>

  <!-- Left column: Your Data -->
  <rect x="40" y="30" width="210" height="220" rx="16" fill="#111111" stroke="#2D2D2D" stroke-width="1.5"/>
  <text x="145" y="65" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">Your Data</text>
  <rect x="65" y="85" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="145" y="110" fill="#888888" font-size="12" text-anchor="middle">CSV Exports</text>
  <rect x="65" y="135" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="145" y="160" fill="#888888" font-size="12" text-anchor="middle">Screenshots</text>
  <rect x="65" y="185" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="145" y="210" fill="#888888" font-size="12" text-anchor="middle">Pasted Metrics</text>

  <!-- Arrow left to center -->
  <line x1="260" y1="140" x2="290" y2="140" stroke="#E07850" stroke-width="2"/>
  <polygon points="287,135 297,140 287,145" fill="#E07850"/>

  <!-- Center column: Analysis Engine -->
  <rect x="300" y="30" width="210" height="220" rx="16" fill="#111111" stroke="#2D2D2D" stroke-width="1.5"/>
  <rect x="300" y="30" width="210" height="4" rx="2" fill="#E07850"/>
  <text x="405" y="65" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">Analysis Engine</text>
  <rect x="325" y="85" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="405" y="110" fill="#888888" font-size="12" text-anchor="middle">250+ Checks</text>
  <rect x="325" y="135" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="405" y="160" fill="#888888" font-size="12" text-anchor="middle">Benchmarks</text>
  <rect x="325" y="185" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="405" y="210" fill="#888888" font-size="12" text-anchor="middle">Quality Gates</text>

  <!-- Arrow center to right -->
  <line x1="520" y1="140" x2="550" y2="140" stroke="#E07850" stroke-width="2"/>
  <polygon points="547,135 557,140 547,145" fill="#E07850"/>

  <!-- Right column: Output -->
  <rect x="560" y="30" width="210" height="220" rx="16" fill="#111111" stroke="#2D2D2D" stroke-width="1.5"/>
  <rect x="560" y="30" width="210" height="4" rx="2" fill="#4ADE80"/>
  <text x="665" y="65" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">Output</text>
  <rect x="585" y="85" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="665" y="110" fill="#888888" font-size="12" text-anchor="middle">Health Score</text>
  <rect x="585" y="135" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="665" y="160" fill="#888888" font-size="12" text-anchor="middle">Action Plan</text>
  <rect x="585" y="185" width="160" height="40" rx="6" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1"/>
  <text x="665" y="210" fill="#888888" font-size="12" text-anchor="middle">PDF Report</text>

  <!-- Bottom: MCP Servers dashed path -->
  <rect x="260" y="285" width="280" height="40" rx="9" fill="#1A1A1A" stroke="#2D2D2D" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="400" y="310" fill="#6a6a6a" font-size="12" text-anchor="middle">MCP Servers (optional API access)</text>
  <line x1="400" y1="285" x2="400" y2="255" stroke="#6a6a6a" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="396,260 400,252 404,260" fill="#6a6a6a"/>
</svg>