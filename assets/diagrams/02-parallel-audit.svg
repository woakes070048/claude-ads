<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <style>
      text { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>
  <rect width="900" height="400" fill="#0A0A0A"/>

  <!-- Top: /ads audit command -->
  <rect x="340" y="30" width="220" height="50" rx="16" fill="#111111" stroke="#E07850" stroke-width="2"/>
  <text x="450" y="62" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">/ads audit</text>

  <!-- Fan-out lines -->
  <line x1="450" y1="80" x2="115.0" y2="155" stroke="#E07850" stroke-width="1.2"/>
  <polygon points="111.0,150 115.0,158 119.0,150" fill="#E07850"/>
  <line x1="450" y1="80" x2="250.0" y2="155" stroke="#E07850" stroke-width="1.2"/>
  <polygon points="246.0,150 250.0,158 254.0,150" fill="#E07850"/>
  <line x1="450" y1="80" x2="385.0" y2="155" stroke="#E07850" stroke-width="1.2"/>
  <polygon points="381.0,150 385.0,158 389.0,150" fill="#E07850"/>
  <line x1="450" y1="80" x2="520.0" y2="155" stroke="#E07850" stroke-width="1.2"/>
  <polygon points="516.0,150 520.0,158 524.0,150" fill="#E07850"/>
  <line x1="450" y1="80" x2="655.0" y2="155" stroke="#E07850" stroke-width="1.2"/>
  <polygon points="651.0,150 655.0,158 659.0,150" fill="#E07850"/>
  <line x1="450" y1="80" x2="790.0" y2="155" stroke="#E07850" stroke-width="1.2"/>
  <polygon points="786.0,150 790.0,158 794.0,150" fill="#E07850"/>

  <!-- Agent boxes -->
  <rect x="55" y="155" width="120" height="70" rx="9" fill="#111111" stroke="#60A5FA" stroke-width="2"/>
  <text x="115.0" y="185" fill="#60A5FA" font-size="11" font-weight="600" text-anchor="middle">audit-google</text>
  <text x="115.0" y="210" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">80</text>
  <rect x="190" y="155" width="120" height="70" rx="9" fill="#111111" stroke="#8b5cf6" stroke-width="2"/>
  <text x="250.0" y="185" fill="#8b5cf6" font-size="11" font-weight="600" text-anchor="middle">audit-meta</text>
  <text x="250.0" y="210" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">50</text>
  <rect x="325" y="155" width="120" height="70" rx="9" fill="#111111" stroke="#F43F5E" stroke-width="2"/>
  <text x="385.0" y="185" fill="#F43F5E" font-size="11" font-weight="600" text-anchor="middle">audit-creative</text>
  <text x="385.0" y="210" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">21+</text>
  <rect x="460" y="155" width="120" height="70" rx="9" fill="#111111" stroke="#F0A830" stroke-width="2"/>
  <text x="520.0" y="185" fill="#F0A830" font-size="11" font-weight="600" text-anchor="middle">audit-tracking</text>
  <text x="520.0" y="210" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">8+</text>
  <rect x="595" y="155" width="120" height="70" rx="9" fill="#111111" stroke="#4ADE80" stroke-width="2"/>
  <text x="655.0" y="185" fill="#4ADE80" font-size="11" font-weight="600" text-anchor="middle">audit-budget</text>
  <text x="655.0" y="210" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">24</text>
  <rect x="730" y="155" width="120" height="70" rx="9" fill="#111111" stroke="#06b6d4" stroke-width="2"/>
  <text x="790.0" y="185" fill="#06b6d4" font-size="11" font-weight="600" text-anchor="middle">audit-compliance</text>
  <text x="790.0" y="210" fill="#F5F5F0" font-size="16" font-weight="700" text-anchor="middle">18+</text>

  <!-- Converge lines -->
  <line x1="115.0" y1="225" x2="450" y2="310" stroke="#E07850" stroke-width="1.2"/>
  <line x1="250.0" y1="225" x2="450" y2="310" stroke="#E07850" stroke-width="1.2"/>
  <line x1="385.0" y1="225" x2="450" y2="310" stroke="#E07850" stroke-width="1.2"/>
  <line x1="520.0" y1="225" x2="450" y2="310" stroke="#E07850" stroke-width="1.2"/>
  <line x1="655.0" y1="225" x2="450" y2="310" stroke="#E07850" stroke-width="1.2"/>
  <line x1="790.0" y1="225" x2="450" y2="310" stroke="#E07850" stroke-width="1.2"/>

  <!-- Bottom: Unified Health Score -->
  <rect x="290" y="310" width="320" height="55" rx="16" fill="#111111" stroke="#4ADE80" stroke-width="2"/>
  <text x="450" y="344" fill="#4ADE80" font-size="15" font-weight="700" text-anchor="middle">Unified Health Score (0–100)</text>
  <polygon points="446,305 450,313 454,305" fill="#E07850"/>
