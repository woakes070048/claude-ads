<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <title>Weighted Scoring Algorithm</title>
  <style>text { font-family: 'Space Grotesk', system-ui, sans-serif; }</style>
  <rect width="800" height="450" fill="#0A0A0A" rx="16"/>
  <text x="400" y="28" font-size="17" fill="#F5F5F0" text-anchor="middle" font-weight="bold" dominant-baseline="central">Weighted Scoring Algorithm</text>
  <line x1="290" y1="40" x2="510" y2="40" stroke="#E07850" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Formula box -->
  <rect x="50" y="55" width="700" height="50" rx="6" fill="#1A1A1A" stroke="#E07850" stroke-width="2"/>
  <text x="400" y="80" font-size="12" fill="#F5F5F0" text-anchor="middle" font-weight="bold" dominant-baseline="central" font-family="'Courier New', monospace">Score = Σ(Pass × Severity × CategoryWeight) / Σ(Total × Severity × CategoryWeight) × 100</text>

  <!-- Left: Category Weights (donut chart) -->
  <text x="200" y="125" font-size="13" fill="#F5F5F0" text-anchor="middle" font-weight="bold" dominant-baseline="central">Category Weights</text>
  <path d="M200.0,135.0 A110,110 0 0,1 310.0,245.0 L260.0,245.0 A60,60 0 0,0 200.0,185.0 Z" fill="#E07850" opacity="0.35" stroke="#E07850" stroke-width="1.5"/>
  <path d="M310.0,245.0 A110,110 0 0,1 234.0,349.6 L218.5,302.1 A60,60 0 0,0 260.0,245.0 Z" fill="#F0A830" opacity="0.35" stroke="#F0A830" stroke-width="1.5"/>
  <path d="M234.0,349.6 A110,110 0 0,1 135.3,334.0 L164.7,293.5 A60,60 0 0,0 218.5,302.1 Z" fill="#60A5FA" opacity="0.35" stroke="#60A5FA" stroke-width="1.5"/>
  <path d="M135.3,334.0 A110,110 0 0,1 90.0,245.0 L140.0,245.0 A60,60 0 0,0 164.7,293.5 Z" fill="#8b5cf6" opacity="0.35" stroke="#8b5cf6" stroke-width="1.5"/>
  <path d="M90.0,245.0 A110,110 0 0,1 135.3,156.0 L164.7,196.5 A60,60 0 0,0 140.0,245.0 Z" fill="#4ADE80" opacity="0.35" stroke="#4ADE80" stroke-width="1.5"/>
  <path d="M135.3,156.0 A110,110 0 0,1 200.0,135.0 L200.0,185.0 A60,60 0 0,0 164.7,196.5 Z" fill="#888888" opacity="0.35" stroke="#888888" stroke-width="1.5"/>

  <!-- Center label -->
  <circle cx="200" cy="245" r="55" fill="#0A0A0A"/>
  <text x="200" y="245" font-size="11" fill="#888888" text-anchor="middle" font-weight="bold" dominant-baseline="central">6 categories</text>

  <rect x="45" y="369" width="12" height="12" rx="2" fill="#E07850" opacity="0.6"/>
  <text x="63" y="375" font-size="10" fill="#888888" text-anchor="start" dominant-baseline="central">Conversion Tracking (25%)</text>
  <rect x="220" y="369" width="12" height="12" rx="2" fill="#F0A830" opacity="0.6"/>
  <text x="238" y="375" font-size="10" fill="#888888" text-anchor="start" dominant-baseline="central">Wasted Spend (20%)</text>
  <rect x="45" y="391" width="12" height="12" rx="2" fill="#60A5FA" opacity="0.6"/>
  <text x="63" y="397" font-size="10" fill="#888888" text-anchor="start" dominant-baseline="central">Structure (15%)</text>
  <rect x="220" y="391" width="12" height="12" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <text x="238" y="397" font-size="10" fill="#888888" text-anchor="start" dominant-baseline="central">Keywords (15%)</text>
  <rect x="45" y="413" width="12" height="12" rx="2" fill="#4ADE80" opacity="0.6"/>
  <text x="63" y="419" font-size="10" fill="#888888" text-anchor="start" dominant-baseline="central">Ads (15%)</text>
  <rect x="220" y="413" width="12" height="12" rx="2" fill="#888888" opacity="0.6"/>
  <text x="238" y="419" font-size="10" fill="#888888" text-anchor="start" dominant-baseline="central">Settings (10%)</text>


  <!-- Right: Severity Multipliers -->
  <text x="590" y="125" font-size="13" fill="#F5F5F0" text-anchor="middle" font-weight="bold" dominant-baseline="central">Severity Multipliers</text>
  <rect x="440" y="145" width="300" height="32" rx="6" fill="#111111" stroke="#2D2D2D" stroke-width="0.5"/>
  <rect x="440" y="145" width="300" height="32" rx="6" fill="#F43F5E" opacity="0.25" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="452" y="161" font-size="12" fill="#F5F5F0" text-anchor="start" font-weight="600" dominant-baseline="central">Critical</text>
  <text x="732" y="161" font-size="12" fill="#F43F5E" text-anchor="end" font-weight="bold" dominant-baseline="central">5.0x</text>
  <rect x="440" y="200" width="300" height="32" rx="6" fill="#111111" stroke="#2D2D2D" stroke-width="0.5"/>
  <rect x="440" y="200" width="180" height="32" rx="6" fill="#FF6B35" opacity="0.25" stroke="#FF6B35" stroke-width="1.5"/>
  <text x="452" y="216" font-size="12" fill="#F5F5F0" text-anchor="start" font-weight="600" dominant-baseline="central">High</text>
  <text x="612" y="216" font-size="12" fill="#FF6B35" text-anchor="end" font-weight="bold" dominant-baseline="central">3.0x</text>
  <rect x="440" y="255" width="300" height="32" rx="6" fill="#111111" stroke="#2D2D2D" stroke-width="0.5"/>
  <rect x="440" y="255" width="90" height="32" rx="6" fill="#F0A830" opacity="0.25" stroke="#F0A830" stroke-width="1.5"/>
  <text x="452" y="271" font-size="12" fill="#F5F5F0" text-anchor="start" font-weight="600" dominant-baseline="central">Medium</text>
  <text x="522" y="271" font-size="12" fill="#F0A830" text-anchor="end" font-weight="bold" dominant-baseline="central">1.5x</text>
  <rect x="440" y="310" width="300" height="32" rx="6" fill="#111111" stroke="#2D2D2D" stroke-width="0.5"/>
  <rect x="440" y="310" width="60" height="32" rx="6" fill="#4ADE80" opacity="0.25" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="452" y="326" font-size="12" fill="#F5F5F0" text-anchor="start" font-weight="600" dominant-baseline="central">Low</text>
  <text x="492" y="326" font-size="12" fill="#4ADE80" text-anchor="end" font-weight="bold" dominant-baseline="central">0.5x</text>


  <!-- Example -->
  <rect x="440" y="375" width="300" height="60" rx="6" fill="#111111" stroke="#2D2D2D" stroke-width="1.5"/>
  <text x="590" y="393" font-size="11" fill="#888888" text-anchor="middle" font-weight="bold" dominant-baseline="central">Example Impact</text>
  <text x="590" y="411" font-size="10" fill="#888888" text-anchor="middle" dominant-baseline="central">Failed Critical check in Conversion Tracking:</text>
  <text x="590" y="427" font-size="10" fill="#F0A830" text-anchor="middle" font-weight="600" dominant-baseline="central">Impact = 5.0 (severity) × 0.25 (category) = 1.25 pts</text>
</svg>